<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>数据管理</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #1a1a2e; color: #e8e8f0; font-size: 14px; min-height: 100vh;
}
.header { padding: 20px 24px 16px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; }
.stats { font-size: 13px; color: #64748b; margin-top: 4px; }

.toolbar { padding: 0 24px 16px; display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  padding: 10px 18px; border-radius: 8px; border: 1px solid #2a2a3e;
  background: rgba(255,255,255,.04); color: #e8e8f0; font-size: 13px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: rgba(255,255,255,.08); }
.btn-primary { border-color: #1a73e8; color: #1a73e8; }
.btn-primary:hover { background: rgba(26,115,232,.1); }
.btn-danger { border-color: #dc2626; color: #dc2626; }
.btn-danger:hover { background: rgba(220,38,38,.1); }
#fileInput { display: none; }

.bank-list { padding: 0 24px; }
.bank-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: rgba(255,255,255,.03); border-radius: 8px; margin-bottom: 8px;
  border: 1px solid #2a2a3e;
}
.bank-item:hover { background: rgba(255,255,255,.06); }
.bank-check { flex-shrink: 0; width: 18px; height: 18px; accent-color: #1a73e8; }
.bank-info { flex: 1; min-width: 0; }
.bank-name { font-size: 14px; font-weight: 600; }
.bank-meta { font-size: 12px; color: #64748b; margin-top: 2px; }
.bank-priority { flex-shrink: 0; font-size: 11px; color: #64748b; background: rgba(255,255,255,.06); padding: 2px 8px; border-radius: 4px; }
.bank-delete {
  flex-shrink: 0; background: none; border: none; color: #64748b;
  font-size: 16px; cursor: pointer; padding: 4px; border-radius: 4px;
}
.bank-delete:hover { color: #dc2626; background: rgba(220,38,38,.1); }

.empty { text-align: center; padding: 60px 20px; color: #64748b; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

.footer { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1f1f35; margin-top: 16px; }
.hint { font-size: 12px; color: #475569; }

.toast {
  position: fixed; top: 16px; right: 16px; padding: 12px 20px; border-radius: 8px;
  font-size: 13px; z-index: 9999; max-width: 400px; animation: slideIn .3s;
  line-height: 1.5;
}
.toast-success { background: #10b981; color: #fff; }
.toast-error { background: #dc2626; color: #fff; }
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📚 题库管理</h1>
    <div class="stats" id="stats">加载中...</div>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" id="btnImport">📥 导入题库</button>
  <button class="btn" id="btnTemplate">📋 下载模板</button>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.json" multiple>
  <input type="file" id="restoreInput" accept=".json" style="display:none">
  <button class="btn" id="btnExport">📤 导出全部</button>
  <button class="btn" id="btnRestore">📥 一键恢复</button>
  <button class="btn" id="btnRefresh">🔄 刷新</button>
</div>

<div class="bank-list" id="bankList">
  <div class="empty">
    <div class="empty-icon">📭</div>
    <p>暂无题库</p>
    <p style="font-size:12px;margin-top:4px">点击「导入题库」添加 Excel 或 JSON 文件</p>
  </div>
</div>

<div class="footer">
  <div class="hint">
    💡 勾选的题库在考试时生效<br>
    多题库按顺序匹配，排前面的优先
  </div>
  <button class="btn btn-primary" id="btnSave">💾 保存并关闭</button>
</div>

<script src="libs/xlsx.mini.js"></script>
<script src="utils/textNormalize.js"></script>
<script src="bank-manager.js"></script>
</body>
</html>
