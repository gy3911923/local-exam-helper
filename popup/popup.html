<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 270px;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  color: #e8e8f0;
  font-size: 13px;
}

.warning-bar {
  background: linear-gradient(135deg, #dc2626, #991b1b);
  color: #fff;
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  line-height: 1.4;
}

.status-section {
  padding: 14px 16px 12px;
  display: flex; align-items: center; gap: 10px;
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  background: #ef4444;
}
.status-dot.active { background: #10b981; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.status-info { flex: 1; }
.status-title { font-size: 16px; font-weight: 700; }
.status-sub { font-size: 11px; color: #64748b; margin-top: 2px; }

.divider { height: 1px; background: #2a2a3e; margin: 0 16px; }

.info-list { padding: 10px 16px; }
.info-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0; font-size: 12px;
}
.info-label { color: #64748b; }
.info-value { color: #e8e8f0; font-weight: 500; }

.instruction { padding: 10px 16px 14px; }
.instruction-title { font-size: 11px; color: #64748b; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
.instruction-item {
  font-size: 12px; color: #94a3b8; padding: 3px 0 3px 14px;
  position: relative; line-height: 1.4;
}
.instruction-item::before { content: '•'; position: absolute; left: 0; color: #1a73e8; }

.btn-row { padding: 8px 16px 14px; }
.safe-btn {
  display: block; width: 100%; padding: 10px; border-radius: 8px;
  border: 1px solid #2a2a3e; background: rgba(255,255,255,.04);
  color: var(--color, #e8e8f0); font-size: 13px; cursor: pointer;
  text-align: center; margin-bottom: 6px;
}
.safe-btn:active { background: rgba(255,255,255,.08); }
.safe-btn .hint-text { font-size: 10px; color: #64748b; display: block; margin-top: 2px; }

.footer { padding: 8px 16px; text-align: center; font-size: 10px; color: #475569; border-top: 1px solid #1f1f35; }
</style>
</head>
<body>

<div class="warning-bar">
  ⚠️ 考试期间请勿点开<br>弹出即触发页面失焦
</div>

<div class="status-section">
  <div class="status-dot" id="statusDot"></div>
  <div class="status-info">
    <div class="status-title" id="statusTitle">就绪</div>
    <div class="status-sub" id="statusSub">按 Ctrl+Shift+E 开关</div>
  </div>
</div>

<div class="divider"></div>

<div class="info-list">
  <div class="info-item">
    <span class="info-label">答题模式</span>
    <span class="info-value" id="infoMode">普通</span>
  </div>
  <div class="info-item">
    <span class="info-label">激活题库</span>
    <span class="info-value" id="infoBanks">0 个</span>
  </div>
  <div class="info-item">
    <span class="info-label">匹配阈值</span>
    <span class="info-value" id="infoThreshold">70%</span>
  </div>
</div>

<div class="divider"></div>

<div class="instruction">
  <div class="instruction-title">快捷键</div>
  <div class="instruction-item"><b>Ctrl+Shift+E</b> — 标准模式</div>
  <div class="instruction-item"><b>Ctrl+Shift+H</b> — 后台模式</div>
  <div class="instruction-item">后台模式不显示任何界面</div>
</div>

<div class="btn-row">
  <button class="safe-btn" id="btnBankManager" style="--color:#1a73e8;border-color:#1a73e8">
    📚 打开题库管理
    <span class="hint-text">考试前操作，考前配置完毕即可</span>
  </button>
  <button class="safe-btn" id="btnSettings">
    ⚙️ 打开设置面板
    <span class="hint-text">调整匹配阈值、OCR密钥（如有）</span>
  </button>
</div>

<div class="footer">纯本地 · 无外网 · 零切屏 · v1.2</div>

<script src="popup.js"></script>
</body>
</html>
